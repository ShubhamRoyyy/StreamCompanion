<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Stream Companion</title>

    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

    <main class="app">

        <!-- Header -->
        <header class="header">

            <h1>🎮 Stream Companion</h1>

            <div class="status-container">

                <div class="live-status">
                    <span class="live-dot"></span>
                    LIVE
                </div>

                <div id="status" class="connection-status">
                    Connecting...
                </div>

            </div>

        </header>

        <!-- Viewer Card -->
        <section class="card">

            <div class="card-header">
                <h2>👥 Viewers</h2>
            </div>

            <div class="card-body">

                <p>Total Viewers</p>

                <span class="big-number">--</span>

            </div>

        </section>

        <!-- Chat Card -->
        <section class="card">

            <div class="card-header">
                <h2>💬 Live Chat</h2>
            </div>

            <div class="card-body">

                <p>Waiting for messages...</p>

            </div>

        </section>

        <!-- Alerts -->
        <section class="card">

            <div class="card-header">
                <h2>❤️ Alerts</h2>
            </div>

            <div class="card-body">

                <p>No alerts yet.</p>

            </div>

        </section>

        <!-- OBS -->
        <section class="card">

            <div class="card-header">
                <h2>🎬 OBS</h2>
            </div>

            <div class="card-body">

                <p>Waiting for OBS...</p>

            </div>

        </section>

    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/app.js"></script>

</body>

</html>
