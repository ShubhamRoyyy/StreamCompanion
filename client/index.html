<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Stream Companion</title>

    <link rel="stylesheet" href="/css/style.css">

</head>

<body>

<div class="app">

    <!-- Header -->

    <header class="header">

        <h1>🎮 Stream Companion</h1>

        <div class="connection">

            <span class="live-dot"></span>

            <span id="status">Connecting...</span>

        </div>

    </header>

    <!-- Viewer Card -->

    <section class="card">

        <h2>👥 Viewers</h2>

        <p>Total Viewers</p>

        <h3>--</h3>

    </section>

    <!-- Chat Card -->

    <section class="card">

        <h2>💬 Live Chat</h2>

        <p>Waiting for messages...</p>

    </section>

    <!-- Alerts -->

    <section class="card">

        <h2>❤️ Alerts</h2>

        <p>No alerts</p>

    </section>

    <!-- OBS -->

    <section class="card">

        <h2>🎬 OBS</h2>

        <p>Waiting for OBS...</p>

    </section>

</div>

<script src="/socket.io/socket.io.js"></script>

<script src="/js/app.js"></script>

</body>

</html>
