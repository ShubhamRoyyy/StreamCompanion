<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Companion</title>

    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

    <main class="app">

        <header class="header">

            <h1>🎮 Stream Companion</h1>

            <div class="status-row">

                <div class="live">
                    🔴 LIVE
                </div>

                <div id="status">
                    Connecting...
                </div>

            </div>

        </header>

        <section class="card">

            <div class="card-title">
                👥 Viewers
            </div>

            <div class="card-content">

                <span class="big-number">--</span>

                <p>Total Viewers</p>

            </div>

        </section>

        <section class="card">

            <div class="card-title">
                💬 Live Chat
            </div>

            <div class="card-content">

                <p>Waiting for messages...</p>

            </div>

        </section>

        <section class="card">

            <div class="card-title">
                ❤️ Alerts
            </div>

            <div class="card-content">

                <p>No alerts.</p>

            </div>

        </section>

        <section class="card">

            <div class="card-title">
                🎬 OBS
            </div>

            <div class="card-content">

                <p>Waiting for OBS...</p>

            </div>

        </section>

    </main>

    <script src="/socket.io/socket.io.js"></script>

    <script src="/js/app.js"></script>

</body>

</html>
